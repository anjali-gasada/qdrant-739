<svg width="100%" viewBox="0 0 680 760" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Qdrant distributed benchmark architecture</title>
<desc>Five-tier diagram: Go bench harness, gRPC connection pool, Qdrant cluster (3 nodes with Raft), chaos and observability sidecar, output artifacts, and SIFT dataset.</desc>
<style>
  text { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; fill: #2C2C2A; }
  .th { font-size: 14px; font-weight: 500; }
  .t  { font-size: 14px; }
  .ts { font-size: 12px; fill: #5F5E5A; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple text { fill: #26215C; }
  .c-teal   rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   text { fill: #04342C; }
  .c-blue   rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   text { fill: #042C53; }
  .c-amber  rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  text { fill: #412402; }
  .c-coral  rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  text { fill: #4A1B0C; }
  .c-gray   rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   text { fill: #2C2C2A; }
  .c-pink   rect { fill: #FBEAF0; stroke: #993556; }
  .c-pink   text { fill: #4B1528; }
  .c-green  rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green  text { fill: #173404; }
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<g class="c-purple">
<rect x="40" y="30" width="600" height="120" rx="14" stroke-width="0.5"/>
<text class="th" x="56" y="54">Go bench harness</text>
<text class="ts" x="56" y="72">cmd binaries + internal packages</text>
</g>
<g class="c-teal">
<rect x="60" y="86" width="130" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="125" y="108" text-anchor="middle">loader</text>
<text class="ts" x="125" y="126" text-anchor="middle">Bulk insert SIFT-1M</text>
</g>
<g class="c-teal">
<rect x="200" y="86" width="130" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="265" y="108" text-anchor="middle">bench</text>
<text class="ts" x="265" y="126" text-anchor="middle">Workloads A-F sweep</text>
</g>
<g class="c-teal">
<rect x="340" y="86" width="130" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="405" y="108" text-anchor="middle">chaos</text>
<text class="ts" x="405" y="126" text-anchor="middle">Kill / partition driver</text>
</g>
<g class="c-teal">
<rect x="480" y="86" width="140" height="50" rx="8" stroke-width="0.5"/>
<text class="th" x="550" y="108" text-anchor="middle">groundtruth</text>
<text class="ts" x="550" y="126" text-anchor="middle">Recall@K validator</text>
</g>

<line x1="125" y1="150" x2="160" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="265" y1="150" x2="265" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="405" y1="150" x2="370" y2="220" class="arr" marker-end="url(#arrow)"/>
<line x1="550" y1="150" x2="490" y2="220" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="178" text-anchor="middle">gRPC :6334/:6434/:6534 (round-robin pool)</text>

<g class="c-blue">
<rect x="40" y="220" width="460" height="200" rx="14" stroke-width="0.5"/>
<text class="th" x="56" y="244">Qdrant cluster (Docker Compose)</text>
<text class="ts" x="56" y="262">Raft consensus on :6335 / 6 shards / RF = 2</text>
</g>

<g class="c-amber">
<rect x="60" y="290" width="130" height="110" rx="10" stroke-width="0.5"/>
<text class="th" x="125" y="314" text-anchor="middle">qdrant-node-1</text>
<text class="ts" x="125" y="334" text-anchor="middle">Shards 1, 4</text>
<text class="ts" x="125" y="354" text-anchor="middle">HNSW + WAL</text>
<text class="ts" x="125" y="378" text-anchor="middle">Raft voter</text>
</g>
<g class="c-amber">
<rect x="200" y="290" width="130" height="110" rx="10" stroke-width="0.5"/>
<text class="th" x="265" y="314" text-anchor="middle">qdrant-node-2</text>
<text class="ts" x="265" y="334" text-anchor="middle">Shards 2, 5</text>
<text class="ts" x="265" y="354" text-anchor="middle">HNSW + WAL</text>
<text class="ts" x="265" y="378" text-anchor="middle">Raft voter</text>
</g>
<g class="c-amber">
<rect x="340" y="290" width="140" height="110" rx="10" stroke-width="0.5"/>
<text class="th" x="410" y="314" text-anchor="middle">qdrant-node-3</text>
<text class="ts" x="410" y="334" text-anchor="middle">Shards 3, 6</text>
<text class="ts" x="410" y="354" text-anchor="middle">HNSW + WAL</text>
<text class="ts" x="410" y="378" text-anchor="middle">Raft voter</text>
</g>

<line x1="190" y1="345" x2="200" y2="345" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 3"/>
<line x1="330" y1="345" x2="340" y2="345" class="arr" marker-end="url(#arrow)" stroke-dasharray="3 3"/>

<g class="c-coral">
<rect x="520" y="220" width="120" height="200" rx="14" stroke-width="0.5"/>
<text class="th" x="580" y="246" text-anchor="middle">Chaos</text>
<text class="ts" x="580" y="264" text-anchor="middle">SIGKILL / iptables</text>
<text class="ts" x="580" y="306" text-anchor="middle">RecoveryWatcher</text>
<text class="ts" x="580" y="324" text-anchor="middle">polls /cluster</text>
<text class="ts" x="580" y="342" text-anchor="middle">100 ms cadence</text>
<text class="ts" x="580" y="370" text-anchor="middle">Detects new</text>
<text class="ts" x="580" y="388" text-anchor="middle">leader + term</text>
</g>
<line x1="500" y1="320" x2="520" y2="320" class="arr" marker-end="url(#arrow)" stroke="#993C1D"/>

<g class="c-gray">
<rect x="40" y="450" width="600" height="110" rx="14" stroke-width="0.5"/>
<text class="th" x="56" y="474">Output artifacts</text>
<text class="ts" x="56" y="492">Per-run JSON + plots</text>
</g>
<g class="c-pink">
<rect x="60" y="510" width="160" height="40" rx="8" stroke-width="0.5"/>
<text class="ts" x="140" y="534" text-anchor="middle">HDR latency histograms</text>
</g>
<g class="c-pink">
<rect x="230" y="510" width="160" height="40" rx="8" stroke-width="0.5"/>
<text class="ts" x="310" y="534" text-anchor="middle">Per-second QPS timeline</text>
</g>
<g class="c-pink">
<rect x="400" y="510" width="100" height="40" rx="8" stroke-width="0.5"/>
<text class="ts" x="450" y="534" text-anchor="middle">Recall@10</text>
</g>
<g class="c-pink">
<rect x="510" y="510" width="110" height="40" rx="8" stroke-width="0.5"/>
<text class="ts" x="565" y="534" text-anchor="middle">Leader timeline</text>
</g>
<line x1="265" y1="420" x2="265" y2="450" class="arr" marker-end="url(#arrow)"/>

<g class="c-green">
<rect x="40" y="600" width="600" height="120" rx="14" stroke-width="0.5"/>
<text class="th" x="56" y="624">SIFT-128-Euclidean dataset</text>
<text class="ts" x="56" y="642">HDF5 file from ann-benchmarks.com</text>
</g>
<g class="c-teal">
<rect x="60" y="660" width="170" height="46" rx="8" stroke-width="0.5"/>
<text class="ts" x="145" y="682" text-anchor="middle">train: 1M x 128 float32</text>
<text class="ts" x="145" y="698" text-anchor="middle">-> loader inserts</text>
</g>
<g class="c-teal">
<rect x="240" y="660" width="170" height="46" rx="8" stroke-width="0.5"/>
<text class="ts" x="325" y="682" text-anchor="middle">test: 10K x 128 float32</text>
<text class="ts" x="325" y="698" text-anchor="middle">-> bench queries</text>
</g>
<g class="c-teal">
<rect x="420" y="660" width="200" height="46" rx="8" stroke-width="0.5"/>
<text class="ts" x="520" y="682" text-anchor="middle">neighbors: 10K x 100 int32</text>
<text class="ts" x="520" y="698" text-anchor="middle">-> recall ground truth</text>
</g>
</svg>
